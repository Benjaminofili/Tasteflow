<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TasteFlow Admin{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Prevent white flash by applying dark mode immediately -->
    <script>
        // Apply theme immediately to prevent white flash
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] },
                    colors: {
                        'primary': '#C84C2E',
                        'charcoal': '#2C2C2E',
                        'pending': '#f97316',
                        'delivered': '#22c55e',
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-900 font-inter">
    <div class="h-full flex">
        
        {% include 'admin/partials/sidebar.html' %}

        <div class="flex-1 flex flex-col h-full overflow-hidden">
            
            <header class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700 flex-shrink-0">
                <div class="px-6 py-4 flex items-center justify-between">
                    <h1 class="text-2xl font-bold text-charcoal dark:text-white">{% block header_title %}Admin{% endblock %}</h1>
                    
                    <button id="darkModeToggle" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
                        <svg class="w-5 h-5 text-gray-600 dark:text-gray-300 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                        <svg class="w-5 h-5 text-gray-600 dark:text-gray-300 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    </button>
                </div>
            </header>

            <main class="flex-1 p-6 overflow-y-auto">
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>

    {% include 'admin/partials/toast.html' %}
    {% include 'admin/partials/modal.html' %}

    <script>
        // Theme Management
        const darkModeToggle = document.getElementById('darkModeToggle');
        const html = document.documentElement;
        
        darkModeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        });

        // Global Admin Logout
        async function adminLogout() {
            showConfirm(
                'Confirm Logout', 
                'Are you sure you want to end your session? Any unsaved changes may be lost.',
                async () => {
                    try {
                        const response = await fetch('/auth/api/auth/logout', { method: 'POST' });
                        if (response.ok) {
                            window.location.href = '/admin/login';
                        } else {
                            showToast('Logout failed. Please try again.', 'error');
                        }
                    } catch (error) {
                        showToast('Network error during logout.', 'error');
                    }
                },
                'danger'
            );
        }
    </script>

    {% block scripts %}
    {% endblock %}
</body>
</html>
