<!-- Premium Toast Notification -->
<div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-3 px-6 py-4 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] backdrop-blur-md border border-white/10 text-white text-sm font-semibold transition-all duration-500 transform translate-y-20 opacity-0 pointer-events-none" style="background: rgba(30, 41, 59, 0.85);">
    <div id="toast-icon-container" class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center bg-white/10">
        <svg id="toast-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
    </div>
    <span id="toast-msg" class="tracking-tight text-white/90"></span>
</div>

<script>
    let toastTimer;

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        const msgEl = document.getElementById('toast-msg');
        const iconEl = document.getElementById('toast-icon');
        const iconContainer = document.getElementById('toast-icon-container');

        // Reset state
        clearTimeout(toastTimer);
        toast.classList.add('pointer-events-none', 'translate-y-20', 'opacity-0');

        setTimeout(() => {
            msgEl.textContent = message;

            if (type === 'success') {
                iconEl.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />';
                iconContainer.className = 'flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center bg-emerald-500/20 text-emerald-400';
            } else if (type === 'error') {
                iconEl.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />';
                iconContainer.className = 'flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center bg-rose-500/20 text-rose-400';
            } else {
                iconEl.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />';
                iconContainer.className = 'flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center bg-blue-500/20 text-blue-400';
            }

            // Animate In
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            toastTimer = setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 4000);
        }, 100);
    }
</script>
